<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NutriQuest: El Reino de los Nutrientes</title>
<meta name="description" content="RPG educativo sobre Nutrición Animal para estudiantes de Medicina Veterinaria y Zootecnia.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<div id="app">
  <header id="hud" aria-label="Panel del jugador"></header>

<script src="js/main.js"></script>
</body>
</html>
